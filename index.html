ზაზა ხინთიბიძე`;

    explanations['s12a'] = `შაირობის რუსთველური თეორია გადმოცემულია ვეფხისტყაოსნის პროლოგის ექვსი სტროფის ფარგლებში (12-17). ის რუსთველის ორიგინალური ესთეტიკური ნააზრევია, ხოლო მისი ძირითადი მეთოდოლოგიური წყარო, როგორც ირკვევა, ანტიკურობის, კერძოდ, პლატონისა და არისტოტელეს პოეტიკური კონცეფციებია. რუსთველი დეტალურად ითვალისწინებს, უპირველეს ყოვლისა, პოეტიკაში გადმოცემულ ე. წ. ჰომეროსული ერთიანობის არისტოტელესეულ კონცეფციას, რომელსაც, პლატონის იდეალისტური ესთეტიკური თვალსაზრისისაგან (სახელმწიფო, 10) პრინციპულად განსხვავებული დებულებების პარალელურად, ეპიკოსის პოზიციიდან გაიაზრებს, შაირობის რუსთველური თეორია ვეფხისტყაოსნის ავტორის ორიგინალური პოეტიკური კონცეფციაა; ჩამოყალიბებული მთელი ანტიკურ-ევროპული ესთეტიკური ტრადიციის (შუასაუკუნეებისა და რენესანსული აზროვნებისათვის დამახასიათებელი სააზროვნო ტენდენციების) გადააზრების პროცესში.

მე-15 საუკუნიდან მოყოლებული ევროპულ ლიტერატურულ კრიტიკაში შეინიშნება პლატონის ესთეტიკური ნააზრევის უარყოფის გარეშე, მასთან დაუპირისპირებლად, მაგრამ მისი გადააზრების გზით პოეზიის ფილოსოფიასთან გათანაბრების, ნეოპლატონური ჰერმენევტიკული მეთოდის რეცეფციის აშკარად გამოხატული ტენდენცია, რაც უკვე სრულიად ნათლად ჩანს მე-16 საუკუნის მეორე ნახევრის იტალიელი პოეტისა და ნეოპლატონიკოსის ტორკვატო ტასოს პოეტური ხელოვნების შესახებ დისკურსში (Discorsi dell'arte poetica).1 მკვლევართა დაკვირვებით, აღნიშნული ტენდენციის ჩასახვისათვის ბიძგი უნდა მიეცა მე-13 საუკუნის შუახანებში არისტოტელეს პოეტიკის არაბულიდან განხორციელებულ პირველ ლათინურ თარგმანს, რომელიც პოპულარული ხდება საუკუნე-ნახევრის შემდეგ თავდაპირველად იტალიაში და მოგვიანებით საფრანგეთშიც. სწორედ არისტოტელეს პოეტიკა და, ამასთანავე, არისტოტელესავე ნიკომაქეს ეთიკა და პლატონის დიალოგები (პირველ ყოვლისა, სახელმწიფო) უნდა ყოფილიყო რუსთველისთვისაც შაირობის თეორიის შექმნის პროცესში უმთავრესი მეთოდოლოგიური წყარო.

შაირობის რუსთველური თეორიის გაანალიზების შედეგად ვლინდება კიდევ ერთი, არანაკლებ მნიშვნელოვანი გარემოება. მასში თეორიულად არის გააზრებული ის კომპოზიციური პრინციპები, რომელთა გათვალისწინებითაცაა შექმნილი პოემის მხატვრული ნაწილი. აღნიშნული, სხვა გარემოებებთან ერთად, ბუნებრივია, მხოლოდ იმაზე შეიძლება მიანიშნებდეს, რომ ვეფხისტყაოსნის ავტორის მიერვეა შექმნილი პოემის პროლოგი, კერძოდ, შაირობის თეორიის ამსახველი სტროფებიც.

შაირობის რუსთველური თეორიის პირველი სისტემური ანალიზი განხორციელდა მეოცე საუკუნის დასაწყისში (1910 წ.) ნ. მარის მიერ ვეფხისტყაოსნის პროლოგის შესწავლის პროცესში.2 მკვლევრის მიერ გამოთქმული მოსაზრებების უმეტესობა მომდევნო ხანების რუსთველოლოგთა მიერ გაზიარებული არ იქნა. ამ მხრივ, უნდა გამოიყოს გ. ნადირაძის, მ. გოგიბერიძის, ა. ბარამიძის და გ. ჯიბლაძის მონოგრაფიები;3 აგრეთვე, უცხოელი რუსთველოლოგის ს. მ. ბოურას გამოკვლევა.4 აღნიშნული ნაშრომების და ამავე დროს, მათში გადმოცემული შეხედულების შემდგომ ხანებში განხორციელებულ ინტერპრეტაციათა შედეგად რუსთველოლოგიაში ჩამოყალიბდა თვალსაზრისი, რომელიც დღემდე სარგებლობს მეტ-ნაკლები პოპულარობით. ამ თვალსაზრისის თანახმად:

1. მე-12 სტროფში რუსთველი საუბრობს პოეზიის კონკრეტული დარგების – ე. წ. საღვთო პოეზიისა და საერო პოეზიის შესახებ და არა საზოგადოდ პოეზიის თაობაზე. აღნიშნული მოსაზრების მართებულობა არგუმენტირებულადაა უარყოფილი ბოლოდროინდელი რუსთველოლოგიური კვლევის შედეგად,5 რის საფუძველზეც გაკეთებულია დასკვნა: „რუსთველი ერთმანეთს არ უპირისპირებს შაირობის ორ სახეობას: საღვთოს და საეროს. იგი საზოგადოდ შაირობაზე ლაპარაკობს“;

2. მე-13-17 სტროფებში რუსთველი უპირატესობას ანიჭებს ეპიკურ პოეზიას და აკრიტიკებს ლირიკოსი პოეტების ლექსებს; კერძოდ, მათ სამ სახეობას. ეს თვალსაზრისი, რომელიც, მთლიანობაში, მართებულ დაკვირვებას ეფუძნება, უკანასკნელი ხანების კვლევა-ძიების შედეგების გათვალისწინებით, გადახედვას და გადააზრებას საჭიროებს.

3. განსახილველი თვალსაზრისის ფარგლებში შენიშნულია ერთგვარი დაპირისპირება ორ რუსთველურ დებულებას შორის. ესენია, ერთი მხრივ, „გრძელი სიტყვა მოკლედ ითქმის, შაირია ამად კარგი“ (12), ხოლო, მეორე მხრივ, „მოშაირე არა ჰქვიან, ვერას იტყვის ვინცა გრძელად“ (17). განსახილველი დაპირისპირების ასახსნელად, აღნიშნული სტრიქონების ნ. მარისეული ინტერპრეტაციის გათვალისწინებით, კერძოდ, სიტყვების – „გრძელი სიტყვა“ „გრძელ აზრად“ მიჩნევის საფუძველზე, გამოთქმულია მოსაზრება, რომ პირველი დებულება სტილურ-რიტორიკული ხასიათისაა. კერძოდ, მასში რუსთველი საუბრობს პოეტური მეტყველებისათვის დამახასიათებელ ლაკონურ-აფორიზმულ მანერაზე. მეორე დებულებით კი რუსთველი, ლირიკულთან შედარებით, უპირატესობას ანიჭებს ეპიკურ ჟანრს (ამ უკანასკნელი მოსაზრების მართებულობა ეჭვს არ იწვევს, მაგრამ, საჭიროა მისი შემდგომი ინტერპრეტირება.

4. დაბოლოს, ტრადიციული თვალსაზრისის ფარგლებში სრულიად უყურადღებოდაა დატოვებული პოეზიის განმარტების, მისი დეფინიციის საკითხი, ანუ რა არის, შაირობის თეორიის ავტორის თანახმად, „შაირი“?! ის გარემოება, რომ პოეზიას რუსთველი მშვენიერებად („შაირია ამად კარგი..“ – 12) უნდა მიიჩნევდეს, ჯერ კიდევ ნ. მარის მიერ იყო შენიშნული; თუმცა, რაიმენაირი არგუმენტაციის წარმოუდგენლად.1 როგორც ჩანს, სწორედ ამ მიზეზით აღნიშნული მოსაზრება რუსთველოლოგთაგან არ იქნა გაზიარებული და 12.4-ში სიტყვა „კარგი“ მ. გოგიბერიძიდან მოყოლებული გააზრებული იქნა მისი თანამედროვე მნიშვნელობით, როგორც „არა ცუდი“.2 მაგრამ ამგვარი თვალსაზრისის გაზიარება (გარდა იმისა, რომ პოეზიის რუსთველურ დეფინიციას ერთობ ბანალური სახით წარმოაჩენს) არღვევს მე-12 სტროფის ერთიანობას.

შაირობის თეორიის შესწავლის მიზნით გასულ საუკუნეში წარმართული რუსთველოლოგიური სამეცნიერო კვლევ-ძიების შედეგად ჩემ მიერ თანდათანობით ჩამოყალიბდა ახალი, ტრადიციულისაგან არსებითად განსხვავებული, თვალსაზრისი. კვლევის შედეგების ეტაპობრივად გამოქვეყნება შესასწავლი პრობლემის მრავალგანზომილებიანობამ განაპირობა.3

შაირობის თეორიის ამ ახალდასრულებული კვლევის ფარგლებში მოპოვებულ განმაზოგადებელ დასკვნებს ქვემოთ იმავე თანმიმდევრობით დავალაგებთ, როგორადაც იყო დაჯგუფებული მე-12-17 სტროფების ტრადიციული რუსთველოლოგიური ინტერპრეტაციისათვის დამახასიათებელი ცალკეული უზუსტობები.

1. შაირობის თეორიის ავტორიტეტულ მკვლევართაგან მ. გოგიბერიძემ პირველმა შენიშნა, რომ მე-12 სტროფის და ამდენად, მთელი შაირობის თეორიის საწყისი დებულებით („შაირობა პირველადვე სიბრძნისაა ერთი დარგი“ – 12.1) რუსთველი ითვალისწინებს არისტოტელეს ცნობილ მოსაზრებას, რომ „ისტორიოგრაფიასთან შედარებით პოეზია არის უფრო ფილოსოფიური და მნიშვნელოვანი“ (პოეტიკა, 9, 1451b5-6).1 მაგრამ არისტოტელეს მიერ, როგორც მკვლევრები მიუთითებენ, დიდი სიფრთხილით შერჩეული სიტყვები – „პოეზიის ფილოსოფიურობა“, ანუ პოეზიის მსგავსება ფილოსოფიასთან, ორგვარად შეიძლება იქნეს გააზრებული. პირველი – როგორც მათი სრული დამსგავსება, ანუ გაიგივება. და მეორე, უფრო ახალი ინტერპრეტაციით: პოეზია და ფილოსოფია ურთიერთმსგავსი, მაგრამ მაინც ერთმანეთისაგან დამოუკიდებელი სფეროებია. ზემოაღნიშნული ორი გააზრებიდან რომელი შეიძლება ყოფილიყო რუსთველისათვის, პოეტისა და მოაზროვნისათვის, უფრო ახლობელი და მისაღები? როგორც კვლევამ აჩვენა, რუსთველისეული „სიბრძნის ერთი დარგი“ უნდა განიმარტოს არისტოტელეს დეფინიციის ორივე ზემოაღნიშნული გააზრების ფონზე. დასაზუსტებელია რუსთველისეული „სიბრძნის დარგის“ მნიშვნელობა. „სიბრძნე“ ძველ ქართულ ენაში ნიშნავს არა მხოლოდ „ფილოსოფიას“, არამედ აგრეთვე „გონებას“, „აზროვნების უნარს“. რაც შეეხება სიტყვას „დარგი“, რომელიც ვეფხისტყაოსნის მხოლოდ ამ ადგილას დასტურდება, სულხან-საბას ლექსიკონის მიხედვით, ნიშნავს „დარგულ ნაწილს“. ამდენად, 12.1 სტრიქონი იმგვარადაც შეიძლება იქნას განმარტებული, რომ არისტოტელესეული „პოეზიის ფილოსოფიურობის“ დებულების ინტერპრეტირების საფუძველზე შაირობის თეორიის ავტორი გამოთქვამს პლატონის და ამდენად, ნეოპლატონური ესთეტიკური კონცეფციისაგან განსხვავებულ მოსაზრებას და პოეზიას, უპირველეს ყოვლისა, ინტელექტუალურ სფეროს მიაკუთვნებს, „გონების მიერ დანერგილ ერთ-ერთ ნაწილად“ მიიჩნევს, რითიც მიანიშნებს პოეზიისა და ფილოსოფიის თანაბარუფლებიანობაზე და არა – მათ სრულ მსგავსება-იდენტურობაზე (რისი შედეგიც პოეზიის მიერ ავტონომიურობის დაკარგვა იქნებოდა).

როგორც ამ მიმართულებით შემდგომმა კვლევამ გამოავლინა, მე-12 სტროფის პირველ ორ სტრიქონში რუსთველი ითვალისწინებს პლატონის საყოველთაოდ ცნობილ მოთხოვნას (სახელმწიფო, 10, 607d) და მისი პოეტიკური თვალსაზრისის საპირისპიროდ, ასაბუთებს დებულებას, რომლის თანახმადაც, პოეზია არა მხოლოდ სასიამოვნოა („კვლა აქაცა ეამების“ – 12.4), არამედ დიდად სასარგებლოც („დიდი მარგი“ – 12.1). რუსთველი, როგორც ჩანს, ითვალისწინებს არისტოტელურ ლოგიკას. საქმე ისაა, რომ არისტოტელე უდიდეს სიკეთედ და უმთავრეს ადამიანურ ბედნიერებად მიიჩნევს ფილოსოფოსის ყოფას, რომელიც მდგომარეობს გონებრივ, გონების მიხედვით, ცხოვრებაში. გონება კი ადამიანის ერთადერთი ღვთაებრივი ნაწილია, რადგან თვით ღვთაებრივი ყოფა სხვა არაფერია, თუ არა მჭვრეტელობა. ამიტომ ღმერთს ყველაზე მეტად სწორედ მოაზროვნე ადამიანი უყვარს და ზრუნავს მასზე, „შეეწევა“ მას (ნიკომაქეს ეთიკა, 10, 6-10). ამგვარად, შემთხვევითი არ უნდა იყოს, რომ რუსთველი „შაირობის“ პირველ ნიშნად ასახელებს გონებასთან, აზროვნებასთან მის უშუალო კავშირს. პოეზია იქმნება გონებით და გონებითვე ხდება მისი აღქმაც. მაგრამ გონება, არისტოტელეს თანახმად, ადამიანის ერთადერთი ღვთაებრივი ნაწილია. ამდენად, სწორედ არისტოტელური ლოგიკით, რაკი პოეზია „გონების დანერგილია“, ის იმავდროულად „საღმრთოც“ არის. დაბოლოს, რაკი ინტელექტუალურ სფეროს განეკუთვნება და საღმრთოა, პოეზია არის „საღმრთოდ გასაგონი“ („გასაგონი“ ფილოსოფიური ხასიათის ტერმინია; კერძოდ, როგორც შესაბამის გამოკვლევებში არაერთგზისაა შენიშნული, „ინტელიგიბელურის“ მნიშვნელობით ფიქსირდება იოანე პეტრიწის ნაშრომებშიც), ანუ არის ღმერთის შეწევნით სააზროვნო („გონებამისაცემი“, – შდრ. 6.2). ამიტომაცაა პოეზია დიდად სასარგებლო („დიდი მარგი“).

პროლოგის მე-6 სტროფის მე-2 ტაეპში რუსთველი დარწმუნებით ამბობს, რომ ვეფხისტყაოსნის შექმნის პროცესში მას აქვს ღმერთის შეწევნა: „შეწევნა შენგნით [ღმერთისგან] მაქვს“ (ესაა სრული თანხმობა ქრისტიანულ რწმენასთან). ამგვარი გააზრება არამც თუ ეწინააღმდეგება ქრისტიანულ რწმენას, არამედ მასთან სრულ თანხვედრაშია. მაგრამ მეთოდოლოგიურად ის ემყარება მსჯელობის სწორედ არისტოტელურ ლოგიკას. ღმერთისგან რუსთველი საკმარის სულიერსა თუ ფიზიკურ ძალას ითხოვს („ძალი მომეც“, – 6). მაგრამ არ ითხოვს „გამოსათქმელად ენას, გულსა და ხელოვანებას“ (6), რომლებიც მას ასევე სჭირდება ვეფხისტყაოსნის შესაქმნელად („აწ ენა მინდა გამოთქმად, გული და ხელოვანება“ – 6), რადგან, როგორც ჩანს, ისინი, ვეფხისტყაოსნის ავტორის რწმენით, პოეტს თავად გააჩნია. ამდენად, როგორც უკვე ითქვა, ტრადიციული რუსთველოლოგიური თვალსაზრისისაგან განსხვავებით, 12.2-ის სიტყვები - „საღმრთო, საღმრთოდ გასაგონი“ არ მიუთითებენ რუსთველის მიერ პოეზიის რომელიმე ნაწილის გამოყოფაზე. იგი მთლიანად პოეზიას მიემართება. მე-12 სტროფში მსჯელობა მიმდინარეობს საზოგადოდ პოეზიის, მისი არსის თაობაზე.

2. მე-13–მე-17 სტროფების კვლევამ გამოავლინა, რომ რუსთველი უპირატესობას ანიჭებს ეპიკურ პოეზიას (13-14; 17), ლირიკოსებს კი მკაცრად აკრიტიკებს („მოშაირე არა ჰქვიან“ - 15=17). მიუხედავად ამისა, ლირიკოსებისადმი რუსთველის დამოკიდებულება, როგორც ირკვევა, არაერთგვაროვანია: ერთნი – „უმსგავსო და შორი-შორი“ (15), ე. ი. მოკლედ ლექსების „მთქმელები“ არიან ე. წ. არშემდგარი „მელექსეები“ (15), სხვები კი „კარგი“ (17), „სასიამოვნო“ (17) და „ნათელი“ (17) ლექსების ავტორები – წარმატებული ლირიკოსები (17). ეპიკოსები განსხვავდებიან როგორც პირველი, ისე მეორე ტიპის ლირიკოსებისაგან ერთი უმთავრესი თვისებით. კერძოდ, ეპიკოსებს ძალუძთ ვრცელი სათქმელის, ეპიკური ფაბულის – „გრძელი სიტყვის მოკლედ თქმის“ ფარგლებში ცალკეული საკვანძო ნაწილების დაწვრილებით გადმოცემა - „ლექსთა გრძელთა თქმა და ხევა“ (13), „არ ამოკლებენ ქართულს“ (14) და ამით თავიდან ირიდებენ - „გრძელი სიტყვის“ „მოკლედ თქმის“ (12), მიუხედავად, მის („გრძელი სიტყვის“) „შემოკლებას“, „სიტყვამცირობას“ (14). მათგან განსხვავებით, ლირიკოსები ქმნიან მცირე ზომის პოეტურ ნაწარმოებებს. საქმე ისაა, რომ ლირიკული, ანუ მცირე ფორმის, ჟანრი იმთავითვეა მოკლებული ვრცელნაწილებიანი პოეტური ნაწარმოების შექმნის შესაძლებლობას. სწორედ ამ მიზეზით ლირიკოსები თავიანთ ლექსებში ვერაფერს, ვერც ერთ ნაწილს, ვერ ამბობენ დაწვრილებით („მოშაირე არა ჰქვიან, ვერას იტყვის ვინცა გრძელად“, – 17). ამის გარეშე კი შეუძლებელია პოეზია იყოს პირველ ყოვლისა „სიბრძნის ერთი დარგი, საღმრთო, საღმრთოდ გასაგონი, მსმენელთათვის“ უაღრესად სასარგებლოც და არა მხოლოდ სასიამოვნო: „ჩვენ მათიცა გვეამების“ (17; შდრ. „კვლა აქაცა ეამების, ვინცა ისმენს კაცი ვარგი – მოსმენისათვის გამოსადეგი, შესაფერისი პიროვნება“).

ამდენად, კარგი ლირიკოსების ლექსები მხოლოდ ნათლად („რაცა ოდენ თქვან ნათელად“, – 17) იმგვარად არიან თქმული, რომ ისინი მხოლოდ სასიამოვნოა და არა ამასთანავე სასარგებლოც. ამგვარად, ლირიკოსები რუსთველის მიერ დაწუნებული უნდა იყვნენ იმ მიზეზით, რომ მათ არ ძალუძთ საჭიროებისამებრ „ლექსთა გრძელთა თქმა და ხევა (ვრცელი სათქმელის, გრძელი ნაწილის მოკვეთა, ანუ დაწვრილებით, მაგრამ მაინც მოკვეთილად, გაუჭიანურებლად - გასაგებად და მწყობრად - თქმა)“ (13). ნათლად თქმა მათ (ლირიკოსებს) მხოლოდ მოკლედ თქმის პროცესში შეუძლიათ და არა ამასთანავე რაიმეს („ვერას იტყვის“, ანუ ვერც ერთ ნაწილს ვერ ამბობს, - 17) „გრძელად“, ანუ ვრცლად, დაწვრილებით, თქმის შემთხვევაშიც. სწორედ ამიტომ უნდა ანიჭებდეს ლირიკულთან შედარებით ეპიკურ ჟანრს რუსთველი უპირატესობას და თავის პოეტიკურ კონცეფციას განმაზოგადებელი დებულებით აჯამებდეს: „ჩვენ მათიცა გვეამების, რაცა ოდენ თქვან ნათელად, / მოშაირე არა ჰქვიან, ვერას იტყვის ვინცა გრძელად“ (17) – ჩვენ მათი მხოლოდ ნათლად თქმული ლექსიც გვსიამოვნებს, მაგრამ „მოშაირე“ არ არის ის, ვისაც არ შეუძლია [თავის ლექსში] რაიმე, ანუ რომელიმე ნაწილი, დაწვრილებით გადმოცეს.

2. როგორც ზემოთ უკვე გამოჩნდა, არა ლირიკული, არამედ სწორედ ეპიკური პოეზიის საშუალებით რეალიზდება უმნიშვნელოვანესი კომპოზიციური პრინციპი „ლექსთა გრძელთა თქმა და ხევა“ (13). ამდენად, ამ სიტყვებით გადმოცემულია ერთიანი პრინციპი (და არა ორი დამოუკიდებელი დებულება, კერძოდ, ერთი მხრივ, „ლექსთა გრძელთა თქმა“ და, მეორე მხრივ, „ხევა“): აუცილებელია, ეპიკური ნაწარმოების დაწვრილებით თქმული ნაწილები თუ ცალკეული ვრცელი ამბები („ლექსთა გრძელთა“) მწყობრად, გაუჭიანურებლად, ანუ გაუგრძელებლად, ბოლომდე დაუსრულებლად იყოს გადმოცემული („თქმა და ხევა“). ეს მიზანი კი მიიღწევა გრძლად, ვრცლად თქმული ნაწილების, ამბების „ხევით“, ანუ მოკვეთით. (სწორედ ეს ერთადერთი მნიშვნელობა აქვს სიტყვას „ხევა“ ძველ ქართულ ენაში). მართლაც, ვეფხისტყაოსანში აშკარად შესამჩნევია ე. წ. შენაკადი ამბების დაწვრილებით, მაგრამ მაინც ბოლომდე დაუსრულებლად გადმოცემის ტენდენცია, რაზეც შესაბამის რუსთველოლოგიურ გამოკვლევებში ყურადღება არაერთგზის გამახვილებულა. როგორც ირკვევა, ვეფხისტყაოსნის ეს ერთ-ერთი ძირითადი კომპოზიციური პრინციპი პოემის პროლოგში თეორიული დისკურსის ფორმითაც არის ასახული. „და გამოსცდის ... მელექსესა ლექსთა გრძელთა თქმა და ხევა“ (13).1

3. 12.4-ით („გრძელი სიტყვა მოკლედ ითქმის“, – ე. წ. პირველი კომპოზიციური პრინციპი) და 17.4-ით („ვერას იტყვის ვინცა გრძელად“, – ე. წ. მეორე კომპოზიციური პრინციპი) გადმოცემული დებულებები ერთგვაროვანი პრინციპებია. მიუხედავად ამისა, ისინი ასახავენ ეპიკური სიუჟეტის კომპოზიციური ორგანიზების მაინც ორ სხვადასხვა ასპექტს, კერძოდ, მთელი ნაწარმოების მასშტაბით (12) და მისი ცალკეული ნაწილების ფარგლებში (17). პირველი დებულება (12) ვერ ჩაითვლება სტილურ-რიტორიკულ პრინციპად; მეორე დებულების (17) მსგავსად, ისიც კომპოზიციური ხასიათისაა. საქმე ისაა, რომ „სიტყვა“ („გრძელი სიტყვა“) უმჯობესია განიმარტოს არა „აზრად“, არამედ „სათქმელად“; მაგრამ – არა მხოლოდ საზოგადოდ სათქმელად, არამედ, პირველ ყოვლისა, ამბად, ე. ი., ლიტერატურათმცოდნეობითი ტერმინოლოგიით, ფაბულად. ამდენად, „გრძელი სიტყვა“ შეიძლება განიმარტოს, როგორც ვრცელი სათქმელი, კერძოდ, გრძელი ამბავი, ეპიკური ფაბულა. შესაბამისად, „მოკლედ თქმა“ ეპიკური ფაბულის, მწყობრ, ნათელ, გაუჭიანურებელ სიუჟეტად გარდასახვას შეიძლება ნიშნავდეს, რაც კომპოზიციური პრინციპია.

ამდენად, შაირობის რუსთველური თეორიის მეთოდოლოგიურ წყაროდ კიდევ ერთხელ იკვეთება არისტოტელეს პოეტიკა, რაზეც, ამჯერად, უკვე შემდეგი ორი გარემოება უნდა მიუთითებდეს. პირველი, – როგორც კვლევით გაირკვა, საფიქრებელია, რომ რუსთველის მიერ „ფაბულის“ და ფაქტობრივად, აგრეთვე „სიუჟეტის“ მნიშვნელობით გააზრებული „სიტყვა“ არისტოტელეს მიერ ფაბულისა და სიუჟეტის აღსანიშნად პოეტიკაში მრავალგზის გამოყენებული „მითოსისა“ (Mythos) და „ლოგოსის“ (Logos) ფარდი ცნება-ტერმინი იყოს. ორივე მათგანი ძველბერძნულად ნიშნავს „სიტყვას“. და მეორე, – „მოკლედ თქმა“ „გრძელი“ სიუჟეტის კომპოზიციური სიმწყობრის, მისი ერთიანობის მისაღწევ კომპოზიციურ პრინციპად გააზრებულია როგორც შაირობის რუსთველურ თეორიაში, ისე არაერთხელ პოეტიკაში. კერძოდ, ჰომეროსული ერთიანობის არისტოტელესეული კონცეფციის თანახმად, „მოკლედ“, ანუ გაუჭიანურებლად და ნათლად, „თქმა“ დიდი ზომის პოეტური ნაწარმოების კომპოზიციური სიმწყობრის განმაპირობებელი ერთ-ერთი გადამწყვეტი ფაქტორია (პოეტიკა, 1459b18-21 და სხვ.). ამგვარად, ამ პირველი კომპოზიციური პრინციპით (12) სიუჟეტის კომპოზიციური ორგანიზება განისაზღვრება მთელი პოეტური ნაწარმოების მასშტაბით, ანუ მაკროსტრუქტურულ დონეზე. რაც შეეხება მეორე კომპოზიციურ პრინციპს, ის, როგორც კვლევამ აჩვენა, მე-17 სტროფის ბოლო ორი ტაეპითაა (17) გადმოცემული და არ შემოიფარგლება მხოლოდ ბოლო ნახევარკარედით (17). საქმე ისაა, რომ მე-17 სტროფის მეოთხე ტაეპის მეორე ნახევარკარედის („ვერას იტყვის ვინცა გრძელად“) მნიშვნელობა ბოლომდე გასაგები ხდება მხოლოდ წინა ტაეპის (17) აზრის გათვალისწინებით („ჩვენ მათიცა გვეამების, რაცა ოდენ თქვან ნათელად“). კერძოდ, 17.3–4-ით, ფაქტობრივად, ის აზრია გადმოცემული, რომ მოშაირე არ არის ის, ვისაც არ შეუძლია ნაწარმოები შექმნას ორივე (და არა მხოლოდ პირველი ან მხოლოდ მეორე) კომპოზიციური პრინციპის გათვალისწინებით: როგორც კველევამ აჩვენა, მე-17 სტროფის კარგი ლირიკოსი პოეტები დაწუნებულია იმ მიზეზით, რომ ისინი ყველაფერს ნათლად ამბობენ („რაცა ოდენ თქვან ნათელად“, ანუ „რომელსაც მხოლოდ ნათლად ამბობენ“), მაგრამ ყველაფრის მოკლედ თქმის საშუალებით („ვერას იტყვის ვინცა გრძელად“, ანუ „ყველაფერს მოკლედ ამბობენ“), რაც, თავის მხრივ, იმას ნიშნავს, რომ ისინი ნაწარმოების ცალკეულ ნაწილებს, როცა ეს საჭიროა, გრძლად (და კვლავაც ნათლად) არ / ვერ ამბობენ; ამით ირღვევა პირველი კომპოზიციური პრინციპიც: ნაწარმოები, მიუხედავად „მოკლედ თქმულობისა“, უკვე აღარ არის „გრძელი სიტყვა“.

მეორე კომპოზიციური პრინციპით შეჯამებულია მე-13–მე-17 სტროფებით გადმოცემული ერთიანი დისკურსი. კერძოდ, მისი საშუალებით სიუჟეტის კომპოზიციური ორგანიზება განისაზღვრება მთელი ნაწარმოების შემადგენელი უკვე ცალკეული ნაწილების ფარგლებში, ანუ მიკროსტრუქტურულ დონეზე. ის გულისხმობს, საჭიროების შემთხვევაში, ნაწარმოების ცალკეული ნაწილების ვრცლად და, ჩემი აზრით, მაინც ნათლად თქმას, რისი საშუალებითაც ნათლად („მოკლედ“) თქმული იქნება სწორედ ეპიკური „გრძელი სიტყვა“ და არა ეპიკურზე უფრო მცირე ზომის ლირიკული ნაწარმოები.

4. მე-12 სტროფის ბოლო ნახევარკარედით გადმოცემულია პოეზიის რუსთველური განმარტება: „შაირია ამად კარგი“. მე-12 სტროფის საერთო კონტექსტის გათვალისწინებით, რუსთველი პოეზიას აცხადებს, ერთდროულად, მშვენიერებად და სიკეთედ! (სიტყვა „კარგი“ ვეფხისტყაოსანში გამოიყენება არა მხოლოდ თანამედროვე მნიშვნელობით, არამედ ორივე ამ გააზრებითაც.)

პოეზიის მშვენიერებად მიჩნევის შემთხვევაში, მეთოდოლოგიური თვალსაზრისით, არისტოტელურია უკვე არა მხოლოდ მსჯელობის ლოგიკა, არამედ არგუმენტაციაც. კერძოდ, როგორც ირკვევა, რუსთველი უნდა იზიარებდეს მშვენიერების ცნობილ არისტოტელესეულ კონცეპტს, რომელიც პოეზიასთან, კერძოდ, ტრაგედიასთან მიმართებით პოეტიკის მე-7 თავშია ჩამოყალიბებული: „τὸ γὰρ καλὸν ἐν μεγέθει καὶ τάξει ἐστίν“ – „ვინაიდან მშვენიერება [„კარგი“] მდგომარეობს სიდიდესა [„გრძელი სიტყვა“] და სიმწყობრეში [„მოკლედ ითქმის“]“ (პოეტიკა, 1450b36-37).

რაც შეეხება პოეზიის მიჩნევას სიკეთედ, მის ერთ-ერთ გამოვლინებად, ადამიანებისათვის ბედნიერების უკვე ამქვეყნადვე მომნიჭებლად („კვლა აქაცა ეამების“), ამ შემთხვევაში არგუმენტაცია, ერთდროულად, არისტოტელურიცაა და პლატონურიც. რუსთველის თანახმად, პოეზია სიკეთის ერთ-ერთი ამქვეყნიური განსახიერება იმიტომაა, რომ ის ერთდროულად არის სასარგებლოც („მარგი“) და სასიამოვნოც („ეამების“). ამიტომაც არის „შაირი კარგი“ (სიტყვის „კარგი“ ერთ-ერთი მნიშვნელობა ვეფხისტყაოსანში არის „სიკეთე“; იხ. 1491,2-3: „ღმერთი კარგსა მოავლინებს...“). არისტოტელეს თანახმად, კეთილი მეგობრობა მეგობრობის სასარგებლო და სასიამოვნო სახეობათა ნაზავია (ნიკომაქეს ეთიკა, 8). პლატონი კი, როგორც ზემოთ უკვე აღინიშნა, პოეზიას კიცხავს სწორედ იმ მიზეზით, რომ ის სასიამოვნოსთან ერთად იმავდროულად არ არის სასარგებლოც (სახელმწიფო, 10, 607d). მაგრამ, როგორც ცნობილია, არც არისტოტელე და, მით უმეტეს, პლატონი პოეზიას სიკეთედ არ მიიჩნევენ. კერძოდ, პლატონის თანახმად, მშვენიერება არის სიკეთის თანამდევი, მისი აუცილებელი თვისება (კანონები 841c, ფილებოსი 65-66b, სახელმწიფო 401c, ნადიმი 201c და 205e). როგორც შენიშნულია მკვლევართა მიერ, სწორედ ამიტომ, რაკი პლატონი პოეზიას სიკეთედ არ განიხილავს, მისთვის ის (პოეზია) არც მშვენიერია (განსხვავებით ნეოპლატონიკოსებისაგან). ხოლო არისტოტელეს თანახმად, პოეზია მშვენიერია, მაგრამ მშვენიერება სიკეთესთან შერწყმულია მხოლოდ მათემატიკაში, კერძოდ, რიცხვების შემთხვევაში (მეტაფიზიკა 1078a31-b6) და არა პოეზიაში. შესაბამისად, პლატონი პოეზიას კიცხავს და მას ფილოსოფიისაგან მკვეთრად მიჯნავს (სახელმწიფო, 10), ხოლო არისტოტელე, როგორც უკვე აღინიშნა, დიდი სიფრთხილით საუბრობს „პოეზიის ფილოსოფიურობაზე“, ანუ მათ მსგავსებაზე; მაგრამ ფილოსოფიისგან განსხვავებით, პოეზიას (რომლის მიზანიც კათარსისით „შემოიფარგლება“) არ მიაკუთვნებს ადამიანური საქმიანობის უმაღლეს, თეორიულსა და თვითკმარ კატეგორიას, რომელიც ჭეშმარიტების წვდომაა.

ამდენად, პოეზიის რუსთველური განმარტება განსხვავდება არა მხოლოდ პლატონის, არამედ არისტოტელეს შეხედულებისგანაც; თუმცა, ამ უკანასკნელთან, უდავოდ, მეტ სიახლოვეს ამჟღავნებს. ანტიკური პოეტიკური თეორიების გათვალისწინებით და მათი გადააზრების პროცესში რუსთველი პოეზიას აცხადებს, ერთდროულად, მშვენიერებად და სიკეთედ.

    explanations['s12b'] = `ვეფხისტყაოსნის შაირობის კონცეფციის ინტერპრეტირებისათვის განსახილველი კონტექსტის („შაირობა პირველადვე სიბრძნისაა ერთი დარგი“ – (12) სიტყვა „დარგის“ საგანგებო განმარტებაა საჭირო. როგორც ჩანს, იმ გარემოების გამო, რომ პოემაში შესადარებელი ადგილი ამ სიტყვას არ მოეპოვება, ხოლო თანამედროვე ქართულში კი ის ერთადერთი მნიშვნელობით გამოიყენება (ეს მნიშვნელობაა „ნაწილი“, მაგალითად, „ფიზიკა მეცნიერების ერთ-ერთი დარგია, ანუ ნაწილია“), რუსთველოლოგიაში საგანგებო კვლევის გარეშე თანდათანობით ჩამოყალიბდა აზრი, რომ რუსთველი პოეზიაზე საუბარს თითქოს იმგვარი ფრიად სადავო მოსაზრებით იწყებდეს, რომლის თანახმადაც პოეზია იმთავითვე, ან უპირველეს ყოვლისა, არის სიბრძნის, ე.ი. სიბრძნისმეტყველების, ანუ ფილოსოფიის, ერთ-ერთი დარგი, მისი შემადგენელი ნაწილი. ვფიქრობ, რომ რუსთველი ზემოაღნიშნულისაგან სრულიად განსხვავებულ თვალსაზრისს უნდა გამოთქვამდეს. კერძოდ, სავარაუდოდ, უნდა მიანიშნებდეს პოეზიის სიბრძნისმეტყველებისაგან განსხვავებულობაზე; შაირობის ფილოსოფიისაგან, თუ შეიძლება ასე ითქვას, დამოუკიდებლობაზე. თუმცა, პოეზიის ღირსებათა წარმოსაჩენად ყურადღებას უნდა ამახვილებდეს ფილოსოფიასთან მის მსგავსებაზე. საფიქრებელია, რომ სწორედ ამიტომ უნდა იწყებდეს თავისი ესთეტიკური ნააზრევის გადმოცემას რუსთველი იმ გარემოებაზე ყურადღების გამახვილებით, რომ პოეზია „სიბრძნის“, ანუ გონების, აზროვნების, ერთ-ერთი „დარგია“ (იგულისხმება ფილოსოფიის მსგავსად), ე.ი. გონების მიერაა დარგული, დანერგილი. პოეზია აზროვნების ნაყოფია, ისევე როგორც სიბრძნისმეტყველება. „დარგს“ რომ სწორედ ეს მნიშვნელობა უნდა ჰქონოდა ძველ ქართულში, ნათლად ჩანს როგორც სულხან-საბას ლექსიკონიდან, რომელშიც „დარგი“ განმარტებულია, როგორც „დარგული ნაწილი“, ისე რუსთველამდელი სიტყვიერების ნიმუშებიდან (იხ. კომენტარი: [[LINK:s12a:„შაირობა პირველადვე…“]] (12) შაირობის რუსთველური თეორია).

ზაზა ხინთიბიძე`;

    explanations['s12c'] = `სიტყვა „კარგი“ რუსთველთან ძირითადად გამოიყენება მისი თანამედროვე მნიშვნელობით, როგორც „არა ცუდი“. მაგრამ „კარგის“ ამგვარად გააზრებული მნიშვნელობის თანახმად, შაირობის რუსთველური განსაზღვრება მეტად ბანალური და მარტივი გამოდის: პოეტი ჩამოთვლის პოეზიის სხვადასხვა ნიშან-თვისებებს და ბოლოს ყოველგვარი დეფინიციის გარეშე, თითქოს, დაასკვნის, რომ სწორედ ამ თვისებათა გამო შაირი არის კარგი, ანუ არ არის ცუდი. სინამდვილეში კი რუსთველი ამბობს, რომ პოეზია ერთდროულად არის სიკეთისა და მშვენიერების სიტყვიერი გამოვლინება, რითიც აყალიბებს სრულიად ორიგინალურ მოსაზრებას, განსხვავებულს როგორც არისტოტელეს, ისე პლატონურ-ნეოპლატონური ეთიკურ-ესთეტიკური ნააზრევისაგან. საქმე ისაა, რომ „კარგს“ ძირითადთან ერთად პოემაში აქვს ორივე ზემოხსენებული მნიშვნელობაც და მე-12 სტროფშიც ანტიკური ესთეტიკური კონცეფციების (პლატონისეულისა და არისტოტელესეულის) გათვალისწინებითა და გადააზრებით ფილოსოფიის, როგორც სწორედ სიკეთისა და მშვენიერების, კონცეპტის დასაბუთებაა გადმოცემული (იხ. კომენტარი: [[LINK:s12a:„შაირობა პირველადვე…“]] (12) შაირობის რუსთველური თეორია).

ზაზა ხინთიბიძე`;

    let currentChapter = 0;

    function buildNav() {
        const ul = document.getElementById('chapter-list');
        ul.innerHTML = '';
        POEM_DATA.forEach((ch, idx) => {
            const li = document.createElement('li');
            li.innerHTML = '<span class="chnum">' + (idx + 1) + '.</span>' + ch.title;
            li.onclick = () => goToChapter(idx);
            li.id = 'nav-ch-' + idx;
            ul.appendChild(li);
        });
    }

    function renderChapter(idx) {
        const ch = POEM_DATA[idx];
        const titleEl = document.getElementById('chapter-title');

        // ზოგიერთ თავის სათაურზეც არის მიბმული კომენტარი (მაგ. „დასაწყისი“).
        // შიდა span-ში ვახვევთ, რომ h2-ის საკუთარმა სექციის გამყოფმა ხაზმა
        // (border-bottom მთელ სიგანეზე) იმუშაოს ისე, როგორც სხვა თავებშიც.
        const chapterKey = chapterTitleTriggers[idx];
        if (chapterKey) {
            titleEl.innerHTML = '<span class="clickable comment-trigger" data-key="' +
                chapterKey + '" onclick="showExplanation(\'' + chapterKey + '\', this)">' +
                escapeHtml(ch.title) + '</span>';
        } else {
            titleEl.textContent = ch.title;
        }

        // პოემის სათაურის ბეჯი მხოლოდ პირველ თავში ჩანს (ორგანულად, სადაც პოემა იწყება)
        const titleBadge = document.getElementById('poem-title-badge');
        titleBadge.style.display = (idx === 0) ? '' : 'none';

        const container = document.getElementById('stanzas-container');
        container.innerHTML = '';

        ch.stanzas.forEach(st => {
            const div = document.createElement('div');
            div.className = 'stanza';

            const numSpan = document.createElement('span');
            numSpan.className = 'stanza-number';
            numSpan.textContent = st.number + (st.alt_number ? ' (' + st.alt_number + ')' : '');
            div.appendChild(numSpan);

            const textSpan = document.createElement('span');
            const stanzaId = 's' + st.number;
            textSpan.id = 'poem-' + stanzaId;
            textSpan.innerHTML = renderStanzaLines(st.lines, stanzaId);
            div.appendChild(textSpan);

            container.appendChild(div);
        });

        // ნავიგაციის მარკირება
        document.querySelectorAll('.nav-panel li').forEach(li => li.classList.remove('chapter-active'));
        const activeLi = document.getElementById('nav-ch-' + idx);
        if (activeLi) {
            activeLi.classList.add('chapter-active');
            activeLi.scrollIntoView({ block: 'nearest' });
        }

        document.getElementById('prev-chapter-btn').disabled = (idx === 0);
        document.getElementById('next-chapter-btn').disabled = (idx === POEM_DATA.length - 1);

        document.getElementById('poem-panel').scrollTop = 0;
        document.getElementById('commentary-content').innerHTML =
            '<div class="placeholder-text">კომენტარის სანახავად დააწკაპუნეთ პოემის ტექსტზე.</div>';
    }

    function goToChapter(idx) {
        if (idx < 0 || idx >= POEM_DATA.length) return;
        currentChapter = idx;
        renderChapter(idx);
    }

    function escapeHtml(s) {
        const div = document.createElement('div');
        div.textContent = s;
        return div.innerHTML;
    }

    // სტროფის სტრიქონების აწყობა HTML-ად: commentTriggers[stanzaId] არის მასივი
    // { trigger, key } წყვილებისა — ერთ სტროფს შეიძლება რამდენიმე ცალკეული
    // კომენტარი ჰქონდეს დაბმული (მაგ. სტროფი 3-ს ორი კომენტარი). თითოეული
    // ტრიგერ-ფრაზა (და არა მთელი სტროფი) ხდება ცალკე დაწკაპუნებადი ბმული,
    // რომელიც თავის საკუთარ კომენტარს ხსნის (explanations[key]-დან).
    function renderStanzaLines(lines, stanzaId) {
        const triggers = commentTriggers[stanzaId] || [];
        return lines.map(line => {
            // ვაგროვებთ ყველა ტრიგერის დამთხვევას ამ სტრიქონში, პოზიციის მიხედვით
            const matches = [];
            triggers.forEach(t => {
                const idx = line.indexOf(t.trigger);
                if (idx !== -1) {
                    matches.push({ start: idx, end: idx + t.trigger.length, key: t.key });
                }
            });
            if (matches.length === 0) {
                return escapeHtml(line);
            }
            matches.sort((a, b) => a.start - b.start);
            let html = '';
            let pos = 0;
            matches.forEach(m => {
                if (m.start < pos) return; // overlap guard
                html += escapeHtml(line.slice(pos, m.start));
                html += '<span class="clickable comment-trigger" data-key="' + m.key +
                    '" onclick="showExplanation(\'' + m.key + '\', this)">' +
                    escapeHtml(line.slice(m.start, m.end)) + '</span>';
                pos = m.end;
            });
            html += escapeHtml(line.slice(pos));
            return html;
        }).join('<br>');
    }

    function renderCommentaryHtml(text) {
        const linkPattern = /\[\[LINK:([a-zA-Z0-9_-]+):([^\]]+)\]\]/g;
        return text.replace(linkPattern, function(match, targetId, linkText) {
            return '<a href="javascript:void(0)" class="comment-link" onclick="navigateTo(\'' + targetId + '\')">' + linkText + '</a>';
        });
    }

    // სტროფის ნომრიდან პოულობს, რომელ თავშია ის (კროს-თავის ბმულებისთვის)
    function findChapterOfStanza(stanzaId) {
        // stanzaId შეიძლება იყოს წმინდა სტროფის id ('s135') ან კომენტარის
        // საკუთარი key ('s3b'), თუ სტროფს რამდენიმე კომენტარი აქვს მიბმული —
        // ორივე შემთხვევაში საწყისი რიცხვი გვჭირდება.
        const m = stanzaId.match(/^s(\d+)/);
        const num = m ? parseInt(m[1], 10) : NaN;
        for (let i = 0; i < POEM_DATA.length; i++) {
            if (POEM_DATA[i].stanzas.some(st => st.number === num)) return i;
        }
        return -1;
    }

    function showExplanation(id, element) {
        const raw = explanations[id] || ('სტროფი ' + id.replace('s', '') + '\n\n[ კომენტარი ჯერ არ არის დამატებული — ჩაწერეთ ტექსტი "explanations" ობიექტში, გასაღებით "' + id + '" ]');
        document.getElementById('commentary-content').innerHTML = renderCommentaryHtml(raw);
        document.getElementById('commentary-panel').scrollTop = 0;

        document.querySelectorAll('.active-highlight').forEach(el => el.classList.remove('active-highlight'));
        if (element) element.classList.add('active-highlight');
    }

    function navigateTo(id) {
        const chapterIdx = findChapterOfStanza(id);
        if (chapterIdx === -1) return;

        if (chapterIdx !== currentChapter) {
            currentChapter = chapterIdx;
            renderChapter(chapterIdx);
        }

        // renderChapter ეშვება ასინქრონულად DOM-ში, ამიტომ ოდნავი დაყოვნებით ვპოულობთ ელემენტს
        setTimeout(() => {
            // id შეიძლება იყოს ან სტროფის id (მაგ. 's135'), ან კონკრეტული
            // კომენტარის key (მაგ. 's3b'), თუ ერთ სტროფს რამდენიმე კომენტარი აქვს.
            // ჯერ ვცდილობთ ვიპოვოთ ტრიგერი ზუსტად ამ key-ით მთელ დოკუმენტში.
            let targetElement = document.querySelector('.comment-trigger[data-key="' + id + '"]');
            if (!targetElement) {
                const m = id.match(/^s(\d+)/);
                const stanzaElement = m ? document.getElementById('poem-s' + m[1]) : null;
                if (stanzaElement) {
                    targetElement = stanzaElement.querySelector('.comment-trigger') || stanzaElement;
                }
            }
            if (targetElement) {
                showExplanation(id, targetElement);
                targetElement.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
        }, 0);
    }

    // ინიციალიზაცია
    buildNav();
    renderChapter(0);
</script>
